<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(0,0,0,0.3);
}

.navbar a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

.container {
    padding: 40px;
    text-align: center;
}

.box {
    background: rgba(255,255,255,0.1);
    padding: 45px;
    border-radius: 15px;
    margin: 20px auto;
    width: 550px;  
}

input {
    width: 80%;
    padding: 12px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

.result {
    font-size: 20px;
    margin-top: 15px;
}

.graph {
    margin-top: 30px;
}

img {
    width: 50%;
    border-radius: 10px;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 10px;
    width: 200px;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>⚡ Smart Grid Load Prediction using AI</h2>
    <div>
        <a href="/"><i class="fas fa-home"></i> Home</a>
        <a href="/login"><i class="fas fa-sign-in-alt"></i> Login</a>
        <a href="/signup"><i class="fas fa-user-plus"></i> Signup</a>
    </div>
</div>

<div class="container">

    <div class="box">

        <h1>⚡ Prediction Dashboard</h1>

        <form method="POST">
            <input type="number" name="hour" placeholder="Enter Hour / Day" required>
            <br>
            <button type="submit">Predict</button>
        </form>

        {% if prediction %}
            <div class="result">
                🔥 Predicted Load: <b>{{ prediction }}</b>
            </div>
        {% endif %}

    </div>

    <div class="cards">
        <div class="card">
            📊 Accuracy <br>
            <b>{{ accuracy }}%</b>
        </div>

        <div class="card">
            ⚡ Status <br>
            Active
        </div>
    </div>

    <div class="graph">
        <h2>📈 Load Graph</h2>
        <img src="data:image/png;base64,{{ graph }}">
    </div>

</div>

</body>
</html>
