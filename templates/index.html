<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Grid AI Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(120deg, #3a3a5a, #6c6c8c);
    font-family: 'Segoe UI';
    color: white;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

.card-custom {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

input {
    border-radius: 10px !important;
    padding: 12px;
}

.btn-custom {
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    border: none;
    border-radius: 10px;
    padding: 10px;
    color: white;
}

.result-box {
    margin-top: 15px;
    font-size: 20px;
    color: #00ffcc;
    font-weight: bold;
}

img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">📊 Smart Grid AI Dashboard</div>

<div class="container mt-4">
<div class="row">

    <!-- LEFT PANEL -->
    <div class="col-md-4">
        <div class="card-custom text-center">

            <h4>Prediction Panel</h4>

            <form method="POST">
                <input type="number" name="hour" class="form-control mt-3" 
                placeholder="Enter Hour" required>

                <button class="btn btn-custom mt-3 w-100">Predict</button>
            </form>

            {% if prediction %}
                <div class="result-box">
                    ⚡ Load: {{ prediction }}
                </div>
            {% endif %}

            <div class="mt-3">
                📈 Accuracy: {{ accuracy }}%
            </div>

        </div>
    </div>

    <!-- RIGHT GRAPH -->
    <div class="col-md-8">
        <div class="card-custom">

            <h4>📊 Load Graph</h4>

            <img src="data:image/png;base64,{{ graph }}">

        </div>
    </div>

</div>
</div>

</body>
</html>
