<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Grid AI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 50px;
}

.hero p {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.8;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: #00c6ff;
    color: white;
    cursor: pointer;
    margin-right: 10px;
}

/* SECTION */
.section {
    padding: 80px 20px;
    text-align: center;
    background: #1e293b;
}

.card {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
    width: 250px;
}
</style>
</head>

<body>

<div class="hero">
    <div>
        <h1>⚡ Smart Grid AI</h1>
        <p>Predict electricity load using AI & Machine Learning</p>

        <a href="/login"><button class="btn">Login</button></a>
        <a href="/signup"><button class="btn">Sign Up</button></a>
    </div>
</div>

<div class="section">
    <h2>Features</h2>

    <div class="card">📊 Load Prediction</div>
    <div class="card">⚡ Energy Optimization</div>
    <div class="card">🤖 AI Powered</div>
</div>

</body>
</html>
